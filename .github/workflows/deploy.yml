name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '24'
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/tradepilot-api

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: |
          dotnet sln TradingApp.sln remove src/TradingApp.Worker/TradingApp.Worker.csproj || true
          dotnet sln TradingApp.sln remove tests/TradingApp.Worker.Tests/TradingApp.Worker.Tests.csproj || true
          dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/*.trx'

      - name: Setup Node.js (for Snyk)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Snyk security scan (.NET)
        uses: snyk/actions/dotnet@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      - name: Snyk security scan (npm)
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=frontend/trading-ui/package-lock.json

  build-api-image:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/TradingApp.Api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  build-frontend:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/trading-ui/package-lock.json

      - name: Install dependencies
        working-directory: frontend/trading-ui
        run: npm ci

      - name: Set Azure environment
        working-directory: frontend/trading-ui
        run: |
          cp src/environments/environment.azure.ts src/environments/environment.ts
          sed -i "s|CONTAINER_APP_FQDN|${{ secrets.API_FQDN }}|g" src/environments/environment.ts

      - name: Build Angular app
        working-directory: frontend/trading-ui
        run: npx ng build --configuration production

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/trading-ui/dist/trading-ui/browser

  deploy-api:
    needs: build-api-image
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Container Apps
        uses: azure/cli@v2
        with:
          inlineScript: |
            az containerapp registry set \
              --name tradepilot-dev-api \
              --resource-group rg-tradepilot-dev \
              --server ghcr.io \
              --username ${{ github.actor }} \
              --password ${{ secrets.GHCR_PAT }}
            az containerapp secret set \
              --name tradepilot-dev-api \
              --resource-group rg-tradepilot-dev \
              --secrets "telegram-bot-token=${{ secrets.TELEGRAM_BOT_TOKEN }}"
            az containerapp update \
              --name tradepilot-dev-api \
              --resource-group rg-tradepilot-dev \
              --image ${{ env.API_IMAGE }}:${{ needs.build-api-image.outputs.image-tag }} \
              --set-env-vars \
                "Telegram__BotToken=secretref:telegram-bot-token" \
                "Telegram__BotUsername=${{ secrets.TELEGRAM_BOT_USERNAME }}"

  deploy-frontend:
    needs: build-frontend
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Static Web Apps
        uses: azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          action: upload
          app_location: dist
          skip_app_build: true
          skip_api_build: true
